services:
  h4kslanding:
    build: .
    env_file:
    - .env
    ports:
    - "20000:20000"
    - "${CLOCKS_PORT:-20001}:${CLOCKS_PORT:-20001}"
    environment:
    - SECRET_KEY=${SECRET_KEY:-xxxxxxxxxx}
    - DEBUG=${DEBUG:-False}
    volumes:
    - db_data:/interface/data
    - static_files:/interface/static
    - media_files:/interface/media

volumes:
  db_data:
  static_files:
  media_files:
