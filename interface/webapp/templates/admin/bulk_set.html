{% extends "admin/base_site.html" %}
{% block content %}
<h1>Set {{ field_label }} on {{ count }} item{{ count|pluralize }}</h1>
<form method="post">
  {% csrf_token %}
  <input type="hidden" name="action" value="{{ action }}">
  {% for id in selected_ids %}
    <input type="hidden" name="_selected_action" value="{{ id }}">
  {% endfor %}
  <p>
    <label><strong>{{ field_label }}</strong>
      <input type="{{ input_type }}" name="{{ field_name }}" value="{{ current_value }}"
        {% if input_type == "color" %}style="margin-left:0.5rem;height:2.5rem;width:6rem;cursor:pointer;border:none"{% endif %}
        {% if input_type == "number" %}style="margin-left:0.5rem;width:6rem;"{% endif %}>
    </label>
  </p>
  <p>
    <input type="submit" name="apply" value="Apply to {{ count }} item{{ count|pluralize }}" class="default">
    &nbsp;
    <a href="../">Cancel</a>
  </p>
</form>
{% endblock %}
